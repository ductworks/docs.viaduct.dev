site_name: Viaduct
site_url: !ENV SITE_URL
site_description: A modern multi-tenant GraphQL server
site_author: Airbnb, Inc.
copyright: 'Copyright &copy; 2025 Airbnb, Inc. | <a href="https://creativecommons.org/licenses/by/4.0">CC BY 4.0</a>'

repo_url: https://github.com/airbnb/viaduct
repo_name: airbnb/viaduct
edit_uri: edit/master/docs/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/logo-only-white.svg
  favicon: assets/images/favicon.svg
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

hooks:
  - hooks/copy_markdown.py

extra_css:
  - stylesheets/brand.css
  - kdoc-service-styles.css
  - kdoc-styles.css

extra_javascript:
  - javascripts/copy-markdown.js

plugins:
  - search
  - macros:
      module_name: plugins/code_snippets
      on_error_fail: true

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - def_list
  - footnotes
  - meta
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://viaduct.airbnb.tech/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/airbnb/viaduct
      name: GitHub
    - icon: fontawesome/solid/comments
      link: https://github.com/airbnb/viaduct/discussions
      name: Discussions
    - icon: fontawesome/solid/scale-balanced
      link: https://airbnb.tech/open-source/code-of-conduct/
      name: Code of Conduct
  analytics:
    provider: google
    property: G-79P40SMGG8
  privacy_policy: https://www.airbnb.com/help/article/3175
